<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/JaPerPo/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="JaPerPo — Sprachlern-App fuer Japanisch, Persisch und Portugiesisch."
    />
    <title>JaPerPo</title>
    <script>
      // Flicker-Prevention: Theme vor React-Mount setzen.
      (function () {
        try {
          var stored = localStorage.getItem('japerpo:theme');
          var mode = stored ? JSON.parse(stored) : 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {
          // no-op
        }
      })();
    </script>
    <script type="module" crossorigin src="/JaPerPo/assets/index-d1vuSzSu.js"></script>
    <link rel="stylesheet" crossorigin href="/JaPerPo/assets/index-Gje2an59.css">
  </head>
  <body class="bg-bg text-text-primary">
    <div id="root"></div>
  </body>
</html>
